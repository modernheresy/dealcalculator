<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deal Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1>Property Deal Analyzer</h1>
    <p class="sub">Instantly check if a deal is good or bad</p>

    <div class="card">

      <label>Purchase price (£)</label>
      <input id="price" type="number" placeholder="250000" />

      <label>Deposit (%)</label>
      <input id="deposit" type="number" value="25" />

      <label>Interest rate (%)</label>
      <input id="rate" type="number" value="5" step="0.1"/>

      <label>Mortgage type</label>
      <select id="type">
        <option value="interest">Interest-only</option>
        <option value="repayment">Repayment</option>
      </select>

      <label>Monthly rent (£)</label>
      <input id="rent" type="number" placeholder="1200" />

      <label>Monthly costs (£)</label>
      <input id="costs" type="number" value="200" />

      <button onclick="calculate()">Calculate</button>

    </div>

    <div id="result" class="result hidden"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
